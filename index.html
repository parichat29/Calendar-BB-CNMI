<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Duty System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue: #7ec8e3;
      --blue-dark: #256d85;
      --bg: #f4fbff;
      --card: #ffffff;
      --text: #19323c;
      --muted: #6c7a80;
    }

    * {
      font-family: "Sarabun", sans-serif;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #e9f8ff, #f8fdff);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(37, 109, 133, 0.15);
    }

    .app-shell {
      display: none;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #5bb8d6, #2f8fb0);
      color: white;
      padding: 20px;
      position: fixed;
      inset: 0 auto 0 0;
      overflow-y: auto;
    }

    .brand {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .nav-btn {
      width: 100%;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.9);
      padding: 13px 14px;
      border-radius: 16px;
      text-align: left;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .nav-btn.active,
    .nav-btn:hover {
      background: rgba(255,255,255,.18);
    }

    .main {
      margin-left: 280px;
      padding: 24px;
    }

    .topbar {
      background: white;
      border-radius: 24px;
      padding: 18px 22px;
      box-shadow: 0 10px 30px rgba(37,109,133,.08);
      margin-bottom: 20px;
    }

    .card-soft {
      background: white;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(37,109,133,.08);
    }

    .btn-main {
      background: var(--blue-dark);
      color: white;
      border: 0;
      border-radius: 14px;
      padding: 10px 16px;
      font-weight: 700;
    }

    .mobile-toggle {
      display: none;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: .25s;
        z-index: 20;
      }

      .sidebar.show {
        transform: translateX(0);
      }

      .main {
        margin-left: 0;
        padding: 16px;
      }

      .mobile-toggle {
        display: inline-flex;
      }
    }
  </style>
</head>

<body>

  <section id="loginPage" class="login-page">
    <div class="login-card">
      <h3 class="fw-bold mb-1">Leave Duty System</h3>
      <p class="text-muted mb-4">ระบบลา / ไม่รับเวร / ประชุม</p>

      <label class="form-label">รหัสเจ้าหน้าที่</label>
      <input id="loginUsername" class="form-control mb-3" placeholder="เช่น 020305">

      <label class="form-label">รหัสผ่าน</label>
      <input id="loginPassword" type="password" class="form-control mb-4" placeholder="รหัสผ่าน">

      <button class="btn-main w-100" onclick="login()">เข้าสู่ระบบ</button>
    </div>
  </section>

  <section id="appShell" class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand">Leave Duty</div>

      <button class="nav-btn active">📅 Dashboard</button>
      <button class="nav-btn">📝 บันทึกรายการ</button>
      <button class="nav-btn">📌 รายการของฉัน</button>
      <button class="nav-btn">🏥 ยืนยัน HR</button>
      <button class="nav-btn">⚙️ Admin</button>
      <button class="nav-btn" onclick="logout()">🚪 Logout</button>
    </aside>

    <main class="main">
      <div class="topbar d-flex justify-content-between align-items-center">
        <div>
          <button class="btn-main mobile-toggle me-2" onclick="toggleSidebar()">☰</button>
          <span class="fw-bold">Dashboard รายเดือน</span>
        </div>
        <div id="userLabel" class="text-muted small"></div>
      </div>

      <div class="card-soft">
        <h5 class="fw-bold">พร้อมต่อ API แล้ว</h5>
        <p class="text-muted mb-0">
          ขั้นต่อไปจะเชื่อม Login API, Dashboard Calendar และฟอร์มบันทึกลา
        </p>
      </div>
    </main>
  </section>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyX4SNjaCJTE9mY7ovsmWy3JoTaVB3hoL9h1EH-mlmBks97r83H2a3--MgB2fL0i7HQ/exec";

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("show");
    }

    function login() {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!username || !password) {
        alert("กรุณากรอกรหัสเจ้าหน้าที่และรหัสผ่าน");
        return;
      }

      alert("ขั้นต่อไปจะต่อ API Login จริง");
    }

    function logout() {
      localStorage.removeItem("leaveUser");
      location.reload();
    }
  </script>

</body>
</html>
